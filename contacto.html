<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto | Mi Portafolio</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="assets/favicon.ico" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">🚀 MiPortafolio</div>
      <ul class="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="sobre.html">Sobre mí</a></li>
        <li><a href="portafolio.html">Portafolio</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Contacto</h1>
    <form action="https://formsubmit.co/aldairreyesrojas55@gmail.com" method="POST" id="contact-form" class="form-contacto">
      <input type="text" name="name" placeholder="Tu nombre" required />
      <input type="email" name="email" placeholder="Tu correo electrónico" required />
      <textarea name="message" rows="5" placeholder="Escribe tu mensaje" required></textarea>

      <!-- Opcionales: configuración avanzada -->
      <input type="hidden" name="_subject" value="Nuevo mensaje desde MiPortafolio">
      <input type="hidden" name="_next" value="https://webseg-kappa.vercel.app/gracias.html">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_autoresponse" value="Gracias por tu mensaje. Te responderé pronto.">

      <button type="submit" class="btn" id="btn-submit">Enviar</button>
    </form>

    <!-- Spinner -->
    <div id="spinner" style="display:none; margin:15px 0; text-align:center;">
      <div style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:30px; height:30px; animation: spin 1s linear infinite; margin:0 auto;"></div>
    </div>

    <!-- Estado -->
    <p id="form-status"></p>
  </main>

  <footer>
    <p>&copy; 2025 Mi Portafolio. Todos los derechos reservados.</p>
  </footer>

  <!-- Script para feedback visual -->
  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");
    const spinner = document.getElementById("spinner");
    const submitBtn = document.getElementById("btn-submit");

    form.addEventListener("submit", function() {
      status.textContent = "";
      spinner.style.display = "block";
      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";
    });

    form.addEventListener("reset", function() {
      spinner.style.display = "none";
      submitBtn.disabled = false;
      submitBtn.textContent = "Enviar";
      status.textContent = "✅ ¡Mensaje enviado con éxito!";
      status.style.color = "green";
    });
  </script>

  <!-- Animación del spinner -->
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
