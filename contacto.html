<form id="contact-form" action="https://formspree.io/f/mdkwnzyq" method="POST">
  <input type="text" name="name" placeholder="Tu nombre" required />
  <input type="email" name="email" placeholder="Tu correo electrónico" required />
  <textarea name="message" rows="5" placeholder="Escribe tu mensaje" required></textarea>
  <button type="submit" class="btn" id="btn-submit">Enviar</button>
</form>

<!-- Spinner -->
<div id="spinner" style="display:none; margin:15px 0; text-align:center;">
  <div style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:30px; height:30px; animation: spin 1s linear infinite; margin:0 auto;"></div>
</div>

<!-- Estado -->
<p id="form-status"></p>

<!-- Script para feedback visual -->
<script>
  const form = document.getElementById("contact-form");
  const status = document.getElementById("form-status");
  const spinner = document.getElementById("spinner");
  const submitBtn = document.getElementById("btn-submit");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    status.textContent = "";
    spinner.style.display = "block";
    submitBtn.disabled = true;
    submitBtn.textContent = "Enviando...";

    const formData = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: form.method,
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      spinner.style.display = "none";
      submitBtn.disabled = false;
      submitBtn.textContent = "Enviar";

      if (response.ok) {
        status.textContent = "✅ ¡Mensaje enviado con éxito!";
        status.style.color = "green";
        form.reset();
      } else {
        const data = await response.json();
        status.textContent = "❌ Error al enviar: " + (data.error || "Intenta nuevamente.");
        status.style.color = "red";
      }
    } catch (error) {
      spinner.style.display = "none";
      submitBtn.disabled = false;
      submitBtn.textContent = "Enviar";
      status.textContent = "❌ Error de conexión: " + error.message;
      status.style.color = "red";
    }
  });
</script>

<!-- Animación del spinner -->
<style>
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
