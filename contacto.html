<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto | Mi Portafolio</title>
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">🚀 MiPortafolio</div>
      <button class="menu-toggle" aria-label="Abrir menú">&#9776;</button>
      <ul class="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="sobre.html">Sobre mí</a></li>
        <li><a href="portafolio.html">Portafolio</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Contacto</h1>
    <form id="contact-form" class="form-contacto">
      <input type="text" name="name" placeholder="Tu nombre" required />
      <input type="email" name="email" placeholder="Tu correo electrónico" required />
      <textarea name="message" rows="5" placeholder="Escribe tu mensaje" required></textarea>
      <button type="submit" class="btn" id="btn-submit">Enviar</button>
    </form>

    <!-- Spinner -->
    <div id="spinner" style="display:none; margin:15px 0; text-align:center;">
      <div style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:30px; height:30px; animation: spin 1s linear infinite; margin:0 auto;"></div>
    </div>

    <!-- Estado -->
    <p id="form-status"></p>
  </main>

  <footer>
    <p>&copy; 2025 Mi Portafolio. Todos los derechos reservados.</p>
  </footer>

  <button id="btn-instalar" class="btn-flotante" style="display:none;">📲 Instalar App</button>

  <!-- Script EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("9weVavNJEnGQ98M4H"); // Public Key actual
    })();

    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");
    const spinner = document.getElementById("spinner");
    const submitBtn = document.getElementById("btn-submit");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      status.textContent = "";
      spinner.style.display = "block";
      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";

      emailjs.sendForm("service_b2xa6oq", "template_8p7sfyc", this) // IDs actualizados
        .then(() => {
          spinner.style.display = "none";
          status.textContent = "✅ ¡Mensaje enviado con éxito!";
          status.style.color = "green";
          form.reset();
          submitBtn.disabled = false;
          submitBtn.textContent = "Enviar";
        }, (err) => {
          spinner.style.display = "none";
          status.textContent = "❌ Error al enviar: " + JSON.stringify(err);
          status.style.color = "red";
          submitBtn.disabled = false;
          submitBtn.textContent = "Enviar";
        });
    });
  </script>

  <!-- Animación del spinner -->
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
