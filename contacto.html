  <main>
    <h1>Contacto</h1>
    <form action="https://formsubmit.co/aldairreyesrojas55@gmail.com" method="POST" class="form-contacto">
      <input type="text" name="name" placeholder="Tu nombre" required />
      <input type="email" name="email" placeholder="Tu correo electrónico" required />
      <textarea name="message" rows="5" placeholder="Escribe tu mensaje" required></textarea>

      <!-- Configuración avanzada -->
      <input type="hidden" name="_subject" value="Nuevo mensaje desde MiPortafolio">
      <input type="hidden" name="_next" value="https://webseg-kappa.vercel.app/gracias.html">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_autoresponse" value="Gracias por tu mensaje. Te responderé pronto.">

      <button type="submit" class="btn">Enviar</button>
    </form>
  </main>
